---
- hosts: all
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"
      tags:
        - setup

    - name: Install python3-debian for deb822_repository
      ansible.builtin.apt:
        name: python3-debian
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"
      tags:
        - setup

  roles:
    - role: geerlingguy.pip
      tags:
        - setup

    - role: geerlingguy.docker
      tags:
        - setup

    - role: datadog.dd.agent
      when: "'webservers' in group_names"
      tags:
        - monitoring
        - setup

  tasks:
    - name: Deploy Redmine
      block:
        - name: Create Redmine config directory
          ansible.builtin.file:
            path: "{{ redmine_root_dir }}"
            state: directory
            owner: root
            group: root
            mode: "0755"

        - name: Create Redmine env file
          ansible.builtin.template:
            src: templates/redmine.env.j2
            dest: "{{ redmine_env_path }}"
            owner: root
            group: root
            mode: "0600"

        - name: Run Redmine container
          community.docker.docker_container:
            name: "{{ redmine_container_name }}"
            image: "{{ redmine_image }}"
            state: started
            restart_policy: always
            recreate: true
            pull: missing
            env_file: "{{ redmine_env_path }}"
            published_ports:
              - "{{ redmine_port }}:3000"
      when: "'webservers' in group_names"
      tags:
        - deploy
