---
- hosts: all
  become: true

  roles:
    - role: geerlingguy.pip
      tags:
        - setup

    - role: geerlingguy.docker
      tags:
        - setup

  tasks:
    - name: Create Redmine config directory
      ansible.builtin.file:
        path: "{{ redmine_root_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags:
        - deploy

    - name: Create Redmine env file
      ansible.builtin.template:
        src: templates/redmine.env.j2
        dest: "{{ redmine_env_path }}"
        owner: root
        group: root
        mode: "0600"
      tags:
        - deploy

    - name: Run Redmine container
      community.docker.docker_container:
        name: "{{ redmine_container_name }}"
        image: "{{ redmine_image }}"
        state: started
        restart_policy: always
        recreate: true
        pull: missing
        env_file: "{{ redmine_env_path }}"
        published_ports:
          - "{{ redmine_port }}:3000"
      tags:
        - deploy
